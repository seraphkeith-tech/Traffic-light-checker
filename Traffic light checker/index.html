<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light Simulator</title>
    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Main container holding the background -->
    <div class="background-container">
       
        <!-- Wrapper to hold the traffic light and its pole -->
        <div class="traffic-light-wrapper">
           
            <!-- The Traffic Light Box -->
            <div class="traffic-light">
                <div class="light red" id="red"></div>
                <div class="light yellow" id="yellow"></div>
                <div class="light green" id="green"></div>
            </div>
           
            <!-- The Supporting Pole -->
            <div class="pole"></div>
           
        </div>
       
    </div>

    <!-- Link to the external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
